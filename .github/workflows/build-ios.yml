name: Compile Ametrine Launcher (iOS)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-14
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install System Dependencies
        run: |
          brew update
          brew install cmake ninja ldid dpkg

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Qt for iOS
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.0'
          target: 'ios'
          arch: 'ios'

      - name: Configure CMake
        run: |
          cmake -B build -G Xcode \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build Project
        run: |
          cmake --build build --config Release --target AmetrineLauncher

      - name: Package and Pseudo-sign IPA
        run: |
          mkdir -p Payload
          # Copia el bundle generado
          cp -r build/Release-iphoneos/AmetrineLauncher.app Payload/
          
          # Realiza el pseudo-firmado con ldid para SideStore/TrollStore
          # Esto evita restricciones estrictas de firma y permite JIT/RAM extendida
          ldid -Ssrc/Info.plist Payload/AmetrineLauncher.app/AmetrineLauncher || true
          
          # Empaqueta en formato .ipa
          zip -r AmetrineLauncher.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AmetrineLauncher-iOS-Release
          path: AmetrineLauncher.ipa
          if-no-files-found: error
