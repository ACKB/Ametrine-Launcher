name: Compile Ametrine Launcher (iOS)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-14
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install System Dependencies
        run: |
          brew update
          brew install cmake ninja ldid dpkg cmark tomlplusplus qrencode libarchive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Qt for iOS
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.0'
          target: 'ios'
          arch: 'ios'

      - name: Configure CMake
        run: |
          cmake -B build -G Xcode \
            -DCMAKE_TOOLCHAIN_FILE=${{ env.QT_ROOT_DIR }}/lib/cmake/Qt6/qt.toolchain.cmake \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build Project
        run: |
          cmake --build build --config Release --target AmetrineLauncher

      - name: Package and Pseudo-sign IPA
        run: |
          mkdir -p Payload
          # Copia el bundle generado
          cp -r build/Release-iphoneos/AmetrineLauncher.app Payload/
          
          # Crear directorio para runtimes de Java
          mkdir -p Payload/AmetrineLauncher.app/java_runtimes
          
          # Descargar y extraer JRE 17 para iOS
          echo "Descargando JRE 17..."
          curl -L -o jre17.zip "https://nightly.link/PojavLauncherTeam/android-openjdk-build-multiarch/workflows/build/buildjre17-21/jre17-ios-aarch64.zip"
          mkdir -p jre17-extracted
          unzip -q jre17.zip -d jre17-extracted
          tar -xf jre17-extracted/jre17-ios-aarch64.tar.xz -C Payload/AmetrineLauncher.app/java_runtimes/
          mv Payload/AmetrineLauncher.app/java_runtimes/jre17-ios-aarch64 Payload/AmetrineLauncher.app/java_runtimes/jre17
          rm -rf jre17.zip jre17-extracted
          
          # Descargar y extraer JRE 21 para iOS
          echo "Descargando JRE 21..."
          curl -L -o jre21.zip "https://nightly.link/PojavLauncherTeam/android-openjdk-build-multiarch/workflows/build/buildjre17-21/jre21-ios-aarch64.zip"
          mkdir -p jre21-extracted
          unzip -q jre21.zip -d jre21-extracted
          tar -xf jre21-extracted/jre21-ios-aarch64.tar.xz -C Payload/AmetrineLauncher.app/java_runtimes/
          mv Payload/AmetrineLauncher.app/java_runtimes/jre21-ios-aarch64 Payload/AmetrineLauncher.app/java_runtimes/jre21
          rm -rf jre21.zip jre21-extracted
          
          # Crear directorio para Frameworks
          mkdir -p Payload/AmetrineLauncher.app/Frameworks
          
          # Descargar y extraer MoltenVK para iOS
          echo "Descargando MoltenVK v1.4.1..."
          curl -L -o MoltenVK-ios.tar "https://github.com/KhronosGroup/MoltenVK/releases/download/v1.4.1/MoltenVK-ios.tar"
          mkdir -p moltenvk-extracted
          tar -xf MoltenVK-ios.tar -C moltenvk-extracted
          find moltenvk-extracted -name "libMoltenVK.dylib" -exec cp {} Payload/AmetrineLauncher.app/Frameworks/ \;
          rm -rf MoltenVK-ios.tar moltenvk-extracted
          
          # Realiza el pseudo-firmado con ldid para SideStore/TrollStore
          # Esto evita restricciones estrictas de firma y permite JIT/RAM extendida
          ldid -Ssrc/ios/Info.plist Payload/AmetrineLauncher.app/AmetrineLauncher || true
          ldid -Ssrc/ios/Info.plist Payload/AmetrineLauncher.app/Frameworks/libMoltenVK.dylib || true
          
          # Empaqueta en formato .ipa conservando enlaces simbólicos de los JRE
          zip --symlinks -r AmetrineLauncher.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AmetrineLauncher-iOS-Release
          path: AmetrineLauncher.ipa
          if-no-files-found: error
